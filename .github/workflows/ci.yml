name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Install CMake
        run: pip install cmake

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests
        working-directory: build
        run: make test_host

  kernel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Install CMake
        run: pip install cmake

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        working-directory: build
        run: make run-kernel-test
