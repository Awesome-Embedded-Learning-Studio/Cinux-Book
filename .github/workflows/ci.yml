name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Format code
        run: |
          find kernel user test boot \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \) \
            -exec clang-format -i {} +

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format with clang-format'

  host-tests:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3 cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests
        working-directory: build
        run: make test_host

  line-limits:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Check line-count limits
        run: python3 scripts/check_line_limits.py --hpp 500

  docs:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm build

  kernel-tests:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3 cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        working-directory: build
        run: make run-kernel-test
